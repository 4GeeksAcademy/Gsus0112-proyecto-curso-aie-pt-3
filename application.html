<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TrackFlow | Registro B2B</title>
        <meta name="description" content="Formulario de registro B2B de TrackFlow para optimizar la logística de última milla." />
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-slate-50 text-slate-900 antialiased font-sans">
        
        <header class="border-b border-slate-200 bg-white py-4">
            <nav class="mx-auto flex max-w-3xl items-center justify-between px-4 sm:px-6">
                <a href="index.html" class="text-xl font-extrabold text-emerald-700" aria-label="Volver al inicio">TrackFlow</a>
                <a href="index.html" class="text-sm font-medium text-slate-600 hover:text-slate-900">Cancelar</a>
            </nav>
        </header>

        <main class="mx-auto w-full max-w-3xl px-4 py-12 sm:px-6 lg:py-16">
            <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-10">
                <h1 class="text-2xl font-bold text-slate-900 sm:text-3xl">Registro Comercial B2B</h1>
                <p class="mt-3 text-slate-600">Ingresa los datos de tu empresa para que nuestro equipo comercial evalúe tu volumen operativo y diseñe una propuesta logística a medida.</p>

                <form id="trackflow-b2b-form" class="mt-8 space-y-6" action="#" method="POST" novalidate>
                    <fieldset class="space-y-5 rounded-xl border border-slate-200 p-5">
                        <legend class="px-2 text-sm font-semibold text-slate-700">Datos Operativos</legend>

                        <div>
                            <label for="company-name" class="mb-2 block text-sm font-medium text-slate-800">Nombre de la Empresa *</label>
                            <input id="company-name" name="companyName" type="text" required class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm outline-none transition focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" placeholder="Ej. E-commerce Global S.A." />
                        </div>

                        <div>
                            <label for="corporate-email" class="mb-2 block text-sm font-medium text-slate-800">Email Corporativo *</label>
                            <input id="corporate-email" name="corporateEmail" type="email" required class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm outline-none transition focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" placeholder="operaciones@tuempresa.com" />
                        </div>

                        <div>
                            <label for="contact-phone" class="mb-2 block text-sm font-medium text-slate-800">Teléfono de Contacto *</label>
                            <input id="contact-phone" name="contactPhone" type="tel" required class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm outline-none transition focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" placeholder="+34 600 123 456" />
                        </div>

                        <div>
                            <label for="monthly-volume" class="mb-2 block text-sm font-medium text-slate-800">Volumen estimado de envíos mensuales *</label>
                            <input id="monthly-volume" name="monthlyVolume" type="number" required min="1" class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm outline-none transition focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" placeholder="Ej. 2500" />
                        </div>
                    </fieldset>

                    <div class="flex flex-col gap-3 sm:flex-row">
                        <button type="submit" class="w-full rounded-lg bg-emerald-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-emerald-700 sm:w-auto">Enviar Solicitud</button>
                        <button type="reset" class="w-full rounded-lg border border-slate-300 bg-white px-6 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 sm:w-auto">Limpiar datos</button>
                    </div>
                </form>
            </section>
        </main>

        <script src="validation.js"></script>
    </body>
</html>
